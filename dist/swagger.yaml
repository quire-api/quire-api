          description: Tasks to be created.
          required: true
          schema:
            type: array
            items:
              $ref: '#/definitions/CreateTaskBody'
        - name: return
          in: query
          description: (Optional) Response shape ŌĆö `full` (default) or `compact` (returns `{oid, id}` per element instead of the full task record). Recommended for large batches.
