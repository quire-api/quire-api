        **Rate-limit cost**: each bulk call costs `N` units against the per-minute / per-hour API quota, where `N` is `items.length` ŌĆö the same total cost as `N` equivalent single-task PUTs. The cost does not adjust for skipped items; the per-item resolve still runs.
