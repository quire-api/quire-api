          in: query
          description: |-
            Whether to add non-empty custom fields to the target project if they are not already present.

            If omitted, `true` is assumed. Specify `false` to disable this.
          required: false
          type: string
          x-example: 'true'
      responses:
        '200':
          description: OK — updated task record.
          schema:
            $ref: '#/definitions/TaskWithParentInfo'
        '400':
          description: Bad Request — invalid `project`, `task`, or `position`.
        '403':
          description: Forbidden — caller lacks permission to transfer this task.
        '404':
          description: Not Found — task, target project, or reference task does not exist.
  /task/transfer/{oid}:
    put:
      tags:
        - task
      summary: Transfer an existing task by its OID to another project.
      description: |-
        Transfers an existing task to another project, optionally positioning it relative to an existing task in the target (`?task=` + `?position=`). See the by-ID variant `PUT /task/transfer/id/{projectId}/{taskId}` for the preferred URL form.

        Returns the updated task record.
      operationId: transferTask
      produces:
        - application/json
      parameters:
        - name: oid
          in: path
          description: Task OID.
          required: true
          type: string
        - name: project
          in: query
          description: OID of the target project to which the task will be transferred. Specify "-" for personal tasks in My Tasks.
          required: true
          type: string
          x-example: 0Mg3VQ8kWeiVbLH1PrjzUc89
        - name: task
          in: query
          description: |-
            (Optional) OID of a reference task in the **target** project. How it's used depends on `position`:
            - `parent` (default): the transferred task becomes a child of `task`.
            - `before` / `after`: the transferred task is placed as a sibling, under `task`'s parent.

            If omitted (or `root`), the transferred task becomes a root task in the target project.
          required: false
          type: string
          x-example: 0Mg3VQ8kWeiVbLH1JjvzUcP7
        - name: position
          in: query
          description: |-
            (Optional) Placement relative to `task` in the target project:
            - `parent` (default): child of `task`.
            - `before`: sibling immediately before `task`.
            - `after`: sibling immediately after `task`.

            Omitted or empty → same as `parent`. Any other value returns `400 Bad Request`. `before` / `after` require `task` to refer to a task (not omitted, not `root`).
          required: false
          type: string
          x-example: before
          enum:
            - parent
            - before
            - after
        - name: invite
          in: query
          description: |-
            Whether to invite assignees to the target project if they are not already members.

            If omitted, `true` is assumed. Specify `false` to disable this.
          required: false
          type: string
          x-example: 'true'
        - name: tag
          in: query
          description: |-
            Whether to add tags to the target project if they are not already present.

            If omitted, `true` is assumed. Specify `false` to disable this.
          required: false
          type: string
          x-example: 'true'
        - name: status
          in: query
          description: |-
            Whether to add statuses to the target project if they are not already present.

            If omitted, `true` is assumed. Specify `false` to disable this.
          required: false
          type: string
          x-example: 'true'
        - name: custom-field
          in: query
          description: |-
            Whether to add non-empty custom fields to the target project if they are not already present.

            If omitted, `true` is assumed. Specify `false` to disable this.
          required: false
          type: string
          x-example: 'true'
      responses:
        '200':
          description: OK — updated task record.
          schema:
            $ref: '#/definitions/TaskWithParentInfo'
        '400':
          description: Bad Request — invalid `project`, `task`, or `position`.
        '403':
          description: Forbidden — caller lacks permission to transfer this task.
        '404':
          description: Not Found — task, target project, or reference task does not exist.
  /task/undo-remove/id/{projectId}/{taskId}:
    put:
      tags:
        - task
      summary: Undo the removal of a task by its ID.
      description: |-
        Restores a previously-removed task. Idempotent: if the task is not currently removed, this is a no-op and returns the current task record.

        Subject to the task-creation quota (same as creating a new task): may return `429 Too Many Requests` if the organization is at the plan's task limit.
      operationId: undoRemoveTaskById
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: Project ID. Specify "-" for personal tasks in My Tasks.
          required: true
          type: string
          x-example: my_project
        - name: taskId
          in: path
          description: Task ID.
          required: true
          type: integer
          format: int32
          x-example: 42
      responses:
        '200':
          description: OK — restored task record.
          schema:
            $ref: '#/definitions/TaskWithParentInfo'
        '403':
          description: Forbidden — caller lacks permission to restore this task.
        '404':
          description: Not Found — task does not exist.
        '429':
          description: Too Many Requests — organization is at the plan's task limit.
  /task/undo-remove/{oid}:
    put:
      tags:
        - task
      summary: Undo the removal of a task by its OID.
      description: |-
        Restores a previously-removed task. Idempotent: if the task is not currently removed, this is a no-op and returns the current task record.

        Subject to the task-creation quota (same as creating a new task): may return `429 Too Many Requests` if the organization is at the plan's task limit.
      operationId: undoRemoveTaskByOid
      produces:
        - application/json
      parameters:
        - name: oid
          in: path
          description: Task OID.
          required: true
          type: string
      responses:
        '200':
          description: OK — restored task record.
          schema:
            $ref: '#/definitions/TaskWithParentInfo'
        '403':
          description: Forbidden — caller lacks permission to restore this task.
        '404':
          description: Not Found — task does not exist.
        '429':
          description: Too Many Requests — organization is at the plan's task limit.
  /task/update-timelog/id/{projectId}/{taskId}:
    put:
      tags:
        - task
      summary: Update an existing time log on a task by ID.
      description: |-
        Updates an existing [time log](#definition-Timelog) on the task identified by project + task ID. The log to update is located by the `start`, `end`, and (optional) `user` query parameters — that triple is the log's identity. The body carries new values; any field omitted **or set to `null`** preserves the existing value (so an agent that always includes every field with `null` for unchanged ones is safe). To clear `note`, send an empty string.

        Sub-second precision in time values is truncated to whole seconds (in both query params and body).

        On success returns the task's full timelogs array. Example:

        ```json
        [
          {
            "start": "2026-04-26T09:15:00.000Z",
            "end": "2026-04-26T10:45:00.000Z",
            "billable": true,
            "note": "Updated note",
            "user": { "oid": "u-123", "name": "John Doe" }
          }
        ]
        ```
      operationId: updateTaskTimelogById
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: Project ID.
          required: true
          type: string
        - name: taskId
          in: path
          description: Task ID.
          required: true
          type: integer
          format: int32
        - name: start
          in: query
          description: Start timestamp of the existing log (identifies the log together with `end` and `user`). ISO 8601, UTC.
          required: true
          type: string
          x-example: '2026-04-26T09:00:00Z'
        - name: end
          in: query
          description: End timestamp of the existing log. ISO 8601, UTC.
          required: true
          type: string
          x-example: '2026-04-26T10:30:00Z'
        - name: user
          in: query
          description: (Optional) User the existing log is credited to (OID, ID, or email). Omitted defaults to the authenticated caller.
          required: false
          type: string
          x-example: john.doe@example.com
        - in: body
          name: body
          description: Fields to change.
          required: true
          schema:
            $ref: '#/definitions/UpdateTimelogBody'
      responses:
        '200':
          description: OK — task's full timelogs array.
          schema:
            type: array
            items:
              $ref: '#/definitions/Timelog'
        '400':
          description: Bad Request — query params missing or malformed, or new `end` precedes new `start`.
        '404':
          description: Not Found — no log matches the identifying triple, or the task does not exist.
  /task/update-timelog/{oid}:
    put:
      tags:
        - task
      summary: Update an existing time log on a task by OID.
      description: Updates an existing [time log](#definition-Timelog), identifying the task by OID. See `PUT /task/update-timelog/id/{projectId}/{taskId}` for the preferred by-ID form, full semantics, and an example response.
      operationId: updateTaskTimelogByOid
      produces:
        - application/json
      parameters:
        - name: oid
          in: path
          description: Task OID.
          required: true
          type: string
        - name: start
          in: query
          description: Start timestamp of the existing log. ISO 8601, UTC.
          required: true
          type: string
          x-example: '2026-04-26T09:00:00Z'
        - name: end
          in: query
          description: End timestamp of the existing log. ISO 8601, UTC.
          required: true
          type: string
          x-example: '2026-04-26T10:30:00Z'
        - name: user
          in: query
          description: (Optional) User the existing log is credited to. Defaults to the caller.
          required: false
          type: string
          x-example: john.doe@example.com
        - in: body
          name: body
          description: Fields to change.
          required: true
          schema:
            $ref: '#/definitions/UpdateTimelogBody'
      responses:
        '200':
          description: OK — task's full timelogs array.
          schema:
            type: array
            items:
              $ref: '#/definitions/Timelog'
        '400':
          description: Bad Request.
        '404':
          description: Not Found — no log matches the identifying triple, or the task does not exist.
  /task/{oid}:
    get:
      tags:
        - task
      summary: Get an existing task by its OID.
      description: Returns the full task record.
      operationId: getTask
      produces:
        - application/json
      parameters:
        - name: oid
          in: path
          description: Task OID.
          required: true
          type: string
      responses:
        '200':
          description: OK — task record.
          schema:
            $ref: '#/definitions/TaskWithParentInfo'
        '404':
          description: Not Found — task does not exist.
    post:
      tags:
        - task
      summary: Add a new root task, or relative to another task.
      description: Adds a new task to a project, under another task, or before or after another task.
      operationId: createTask
      produces:
        - application/json
      parameters:
        - name: oid
          in: path
          description: OID of the project or task to which the new task will be added. If the OID refers to a project, the new task becomes a root task. If it refers to a task, the new task becomes its subtask. Specify "-" to add the task to My Tasks.
          required: true
          type: string
        - in: body
          name: body
          description: Task to create.
          required: true
          schema:
            $ref: '#/definitions/CreateTaskBody'
        - name: position
          in: query
          description: |-
            (Optional) Placement of the new task relative to the task referenced by `oid`. This parameter applies only when `oid` refers to a task:
            - `parent` (default): child of the referenced task.
            - `before`: sibling immediately before the referenced task.
            - `after`: sibling immediately after the referenced task.

            Omitted or empty → same as `parent`. Any other value returns `400 Bad Request`.
          required: false
          type: string
          x-example: before
          enum:
            - parent
            - before
            - after
      responses:
        '200':
          description: OK — newly created task.
          schema:
            $ref: '#/definitions/Task'
        '400':
          description: Bad Request — body validation failed.
        '403':
          description: Forbidden — caller lacks permission to add a task here.
        '404':
          description: Not Found — project or parent task does not exist.
    put:
      tags:
        - task
      summary: Update an existing task by its OID.
      description: Updates an existing task and returns the updated record. See `PUT /task/id/{projectId}/{taskId}` for a full request-body example and the replace-vs-incremental field pattern.
      operationId: updateTask
      produces:
        - application/json
      parameters:
        - name: oid
          in: path
          description: Task OID.
          required: true
          type: string
        - in: body
          name: body
          description: Updated task content.
          required: true
          schema:
            $ref: '#/definitions/UpdateTaskBody'
      responses:
        '200':
          description: OK — updated task record.
          schema:
            $ref: '#/definitions/TaskWithParentInfo'
        '400':
          description: Bad Request — body validation failed.
        '403':
          description: Forbidden — caller lacks permission to update this task.
        '404':
          description: Not Found — task does not exist.
    delete:
      tags:
        - task
      summary: Delete a task and all of its subtasks by its OID.
      description: |-
        Deletes an existing task and all of its subtasks.

        > Note: Returns `204 No Content` regardless of whether the task exists.
      operationId: deleteTaskByOid
      produces:
        - application/json
      parameters:
        - name: oid
          in: path
          description: Task OID.
          required: true
          type: string
      responses:
        '204':
          description: No Content
  /user/id/{id}:
    get:
      tags:
        - user
      summary: Get a user by ID or email address.
      description: Returns the full user record for the given user ID, email address, or "me" (the current user).
      operationId: getUserById
      produces:
        - application/json
      parameters:
        - name: id
          in: path
          description: User ID, email address, or "me".
          required: true
          type: string
          x-example: john@example.com
      responses:
        '200':
          description: OK — user record.
          schema:
            $ref: '#/definitions/User'
        '404':
          description: Not Found — user does not exist, or is not visible to the caller.
  /user/list:
    get:
      tags:
        - user
      summary: Get all user records.
      description: |-
        Returns all colleagues of the current user if the user granted the app access to contacts. Otherwise, returns only colleagues who also authorized the same app.
        If the user did not grant contact access and none of the user’s colleagues authorized this app, only the current user is returned.
        The first record is always the current user.
      operationId: getUsers
      produces:
        - application/json
      parameters: []
      responses:
        '200':
          description: OK — list of user records; first entry is always the current user.
          schema:
            type: array
            items:
              $ref: '#/definitions/User'
  /user/list/project/id/{projectId}:
    get:
      tags:
        - user
      summary: Get all user records of the given project (by project ID).
      description: |-
        Returns all members of the specified project by project ID.
        If the current user did not grant the app access to contacts, only basic information is returned.
        The first record is always the current user.
      operationId: getUsersOfProjectById
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: Project ID.
          required: true
          type: string
          x-example: my_project
      responses:
        '200':
          description: OK — list of project members.
          schema:
            type: array
            items:
              $ref: '#/definitions/User'
        '404':
          description: Not Found — project does not exist.
  /user/list/project/{oid}:
    get:
      tags:
        - user
      summary: Get all user records of the given project (by project OID).
      description: |-
        Returns all members of the specified project by project OID.
        If the current user did not grant the app access to contacts, only basic information is returned.
        The first record is always the current user.
      operationId: getUsersOfProjectByOid
      produces:
        - application/json
      parameters:
        - name: oid
          in: path
          description: Project OID.
          required: true
          type: string
      responses:
        '200':
          description: OK — list of project members.
          schema:
            type: array
            items:
              $ref: '#/definitions/User'
        '404':
          description: Not Found — project does not exist.
  /user/{oid}:
    get:
      tags:
        - user
      summary: Get a user by OID.
      description: Returns the full user record for the given OID.
      operationId: getUserByOid
      produces:
        - application/json
      parameters:
        - name: oid
          in: path
          description: User OID.
          required: true
          type: string
      responses:
        '200':
          description: OK — user record.
          schema:
            $ref: '#/definitions/User'
        '404':
          description: Not Found — user does not exist, or is not visible to the caller.
securityDefinitions:
  BasicAuth:
    type: basic
  OAuth2:
    type: oauth2
    authorizationUrl: https://quire.io/oauth
    tokenUrl: https://quire.io/oauth/token
    flow: accessCode
definitions:
  AddAppvCatBody:
    type: object
    required:
      - id
      - name
    properties:
      approvers:
        type: array
        description: |-
          (Optional) Users allowed to approve, reject, or request changes in this category.

          - Omit or `null`: anyone can respond.
          - `[]` (empty list): admins only.
          - List of user OIDs: those specific users.
        items:
          type: string
      claimers:
        type: array
        description: |-
          (Optional) Users allowed to request approval in this category.

          - Omit or `null`: anyone can request.
          - `[]` (empty list): admins only.
          - List of user OIDs: those specific users.
        items:
          type: string
      name:
        type: string
        example: Legal Review
        description: Display name.
      id:
        type: string
        example: legal
        description: Category identifier (URL-safe). Must be unique within the project. The identifier `""` is reserved for the implicit default category.
  AddFieldBody:
    type: object
    required:
      - name
      - type
    properties:
      percent:
        type: boolean
        example: false
        description: (Optional, `number` only) Format the value as a percentage.
      currency:
        type: string
        example: USD
        description: (Optional, `money`/`formula` only) Currency symbol. When omitted on a money field, defaults to `$`.
      private:
        type: boolean
        example: false
        description: (Optional) Restrict access to non-guest members only.
      options:
        type: array
        description: (Required for `select`) Option list.
        items:
          $ref: '#/definitions/FieldOption'
      lookup:
        type: object
        description: (Required for `lookup`) Map from lookup key to numeric value. Keys are OIDs of the configured `lookupType` entity (e.g. user OIDs when `lookupType=User`). Values are numbers.
        additionalProperties:
          $ref: '#/definitions/Number'
      hidden:
        type: boolean
        example: false
        description: (Optional) Hide this field from the task detail panel.
      clearOnDup:
        type: boolean
        example: false
        description: (Optional) Clear this field when duplicating a task.
      withTime:
        type: boolean
        example: false
        description: (Optional, `date` only) Include time-of-day in addition to the date.
      ndecimal:
        type: integer
        format: int32
        example: 2
        description: (Optional, `number`/`money` only) Number of decimal digits. `-1` means no rounding.
        enum:
          - -1
          - 0
          - 1
          - 2
          - 3
      multiple:
        type: boolean
        example: true
        description: (Optional) Allow multiple values. Applies to `select`, `user`, `task`, and `file` (always true for `file`).
      durationFormat:
        type: string
        example: hh:mm
        description: (Optional, `duration`/`formula` only) Duration display format.
        enum:
          - hh:mm:ss
          - hh:mm
          - 1h1m
          - 1h
          - 1d1h
          - dd:hh:mm:ss
          - dd:hh:mm
          - dd:hh
      formula:
        type: string
        example: SUM(Subtask.Amount)
        description: (Required for `formula`) Formula expression.
      resultType:
        type: string
        example: number
        description: (Optional, `formula` only) Expected result type.
        enum:
          - text
          - number
          - money
          - date
          - duration
          - checkbox
      lookupType:
        type: string
        example: User
        description: '(Optional, `lookup` only) Source type for lookup keys. Default: `User`.'
        enum:
          - User
          - Task
          - Project
          - Organization
      conditionFormat:
        type: array
        description: (Optional) Conditional-format rules. Applicable to `date`, `number`, `money`, `duration`, `lookup`, and `formula` fields whose `resultType` resolves to one of those.
        items:
          $ref: '#/definitions/FieldConditionFormat'
      name:
        type: string
        example: Priority
        description: Unique name for this field. Must be a non-empty string and must not contain `}`, `"`, or `\`.
      type:
        type: string
        example: number
        description: Field type. For insight views, only `formula` and `lookup` are accepted.
        enum:
          - text
          - number
          - money
          - date
          - duration
          - select
          - checkbox
          - user
          - task
          - hyperlink
          - email
          - formula
          - file
          - lookup
  AddTimelogBody:
    type: object
    required:
      - end
      - start
    properties:
      end:
        type: string
        example: '2026-04-26T10:30:00Z'
        description: End timestamp (ISO 8601, UTC). Must be on or after `start`. Sub-second precision is truncated to whole seconds.
      start:
        type: string
        example: '2026-04-26T09:00:00Z'
        description: Start timestamp (ISO 8601, UTC). Sub-second precision is truncated to whole seconds.
      billable:
        type: boolean
        example: true
        description: (Optional) Whether this log is billable. Omitted or `null` defaults to `true`.
      note:
        type: string
        example: Pair-programming session
        description: (Optional) Free-form note for the log. Omitted, `null`, or empty stores no note.
      user:
        type: string
        example: john.doe@example.com
        description: (Optional) User identifier (OID, ID, or email) the log is credited to. Omitted, `null`, or empty defaults to the authenticated caller. Unknown users return `400 Bad Request`.
  Approval:
    type: object
    properties:
      approver:
        type: string
        description: OID of the user who most recently approved / rejected / requested changes. Null while `state` is `awaiting`.
      category:
        type: string
        example: legal
        description: Identifier of the approval category this approval belongs to. The default category has id `""`.
      toggledAt:
        type: string
        example: '2026-04-24T10:05:00.000Z'
        description: Timestamp (UTC, ISO 8601) of the last state transition.
      requester:
        type: string
        description: OID of the user who originally requested approval. Preserved across subsequent approve / reject / change transitions.
      state:
        type: string
        example: awaiting
        description: |-
          Current approval state. Derived from the last POST to `/task/approve/id/{projectId}/{taskId}` (or the OID form):
          - `awaiting` — `request` was posted (initial or rolled-back).
          - `approved` — `approve` was posted.
          - `rejected` — `reject` was posted.
          - `changes` — `change` (request-for-changes) was posted.
        enum:
          - awaiting
          - approved
          - rejected
          - changes
  ApproveTaskBody:
    type: object
    required:
      - state
    properties:
      category:
        type: string
        example: legal
        description: |-
          (Optional) Approval category id.

          - Omitted, `null`, or `""`: resolves to the project's default category (id `""`), which is always available.
          - Any other value: must match a category defined on the project; unknown ids return `404 Not Found`.
      state:
        type: string
        example: request
        description: |-
          State transition to apply. Case-insensitive.
          - `request` — request approval (or roll forward from `approved` / `rejected` / `changes` back to `awaiting`).
          - `approve` — approve the request.
          - `reject` — reject the request.
          - `change` — request changes.

          The caller must be a claimer (for `request`) or an approver (for `approve` / `reject` / `change`) of the category; otherwise `403 Forbidden` is returned.
        enum:
          - request
          - approve
          - reject
          - change
  AppvCat:
    type: object
    properties:
      name:
        type: string
        example: Legal Review
        description: Display name.
      id:
        type: string
        example: legal
        description: Category identifier (URL-safe). The implicit default category has an empty id.
      approvers:
        type: array
        position: 20
        description: |-
          Users allowed to approve, reject, or request changes in this category.

          - Omitted from the response: anyone can respond.
          - `[]` (empty list): admins only.
          - List of user OIDs: those specific users.
        items:
          type: string
      claimers:
        type: array
        position: 20
        description: |-
          Users allowed to request approval in this category.

          - Omitted from the response: anyone can request.
          - `[]` (empty list): admins only.
          - List of user OIDs: those specific users.
        items:
          type: string
      createdBy:
        position: 90
        description: User who created this category.
        $ref: '#/definitions/SimpleIdentity'
      createdAt:
        type: string
        example: '2026-04-24T10:00:00.000Z'
