  UpdateTaskBody:
    type: object
    properties:
      description:
        type: string
        example: This is a **cool** task.
        description: (Optional) New task description.
      tags:
        type: array
        example:
          - ITaVbkhh3iVcEcV3vuSLeE2k
        description: |-
          (Optional) Tags to replace the current tags on this task (OID or name).
          This replaces all existing tags. To modify incrementally, use `addTags` or `removeTags`.
          Tag names are case-insensitive.
        items:
          type: string
      start:
        type: string
        example: '2018-12-20T00:00:00.000Z'
        description: |-
          (Optional) Start date/time in UTC.

          - With time: `yyyy-MM-dd'T'HH:mmZ` (e.g., `2020-10-30T09:30Z`).
          - Date only: `yyyy-MM-dd` (e.g., `2020-10-30`).

          Notes:
          - Seconds are not supported.
          - `2020-10-30T00:00:00` is treated as `2020-10-30` (date only).
          - To specify exactly midnight UTC, use `2020-10-30T00:00` (no seconds).
      due:
        type: string
        example: '2018-12-22T00:00:00.000Z'
        description: |-
          (Optional) Due date/time in UTC.

          - With time: `yyyy-MM-dd'T'HH:mmZ` (e.g., `2020-10-30T09:30Z`).
          - Date only: `yyyy-MM-dd` (e.g., `2020-10-30`).

          Notes:
          - Seconds are not supported.
          - `2020-10-30T00:00:00` is treated as `2020-10-30` (date only).
          - To specify exactly midnight UTC, use `2020-10-30T00:00` (no seconds).
      assignees:
        type: array
        example:
          - 6QMKkEPBVWETLWrXqws94ALU
        description: |-
          (Optional) Assignees to replace the current assignees (OID, ID, or email).
          This replaces all existing assignees. To modify incrementally, use `addAssignees` or `removeAssignees`.

          Accepts the same special values as `addAssignees`: `"me"` (the current user) and `"inherit"` (all assignees of the parent task).
        items:
          type: string
      recurrence:
        description: |-
          (Optional) Recurrence details. `null` if the task is not recurring.

          - `freq`: `daily`, `weekly`, `monthly`, `yearly`.
          - `interval`: Interval between occurrences. Default: 1.
          - `until`: End date. Default: never ends.
          - `bymonth`: Month (1 = January). Supported only with `yearly`. Default: 1.
          - `byweekno`: Week number (starting from 1) or `last`. Supported with `monthly`/`yearly`.
          - `byweekday`: Day(s) of week (0 = Monday ... 6 = Sunday). For weekly, use a list (e.g., `[1]`, `[0,3]`).
          - `bydayno`: Day of month (1 = first day). Supported with `monthly`/`yearly`.
            Note: `byweekday` and `bydayno` cannot both be specified.
          - `dupsubtasks`: Duplicate subtasks when the task is completed. Default: true.
          - `sincelatest`: Daily only. Repeat based on the last completion date. Default: false.
        $ref: '#/definitions/Recurrence'
      peekaboo:
        type: object
        example: true
        description: |-
          (Optional) Peekaboo setting. Accepts a boolean or a positive integer:

          - `true`: Hide indefinitely (task and subtasks).
          - positive integer: Number of days to hide.
          - `false`: Undo previous peekaboo.

          Default: false.
        anyOf:
          - type: boolean
          - type: integer
      section:
        type: boolean
        example: true
        description: '(Optional) Whether this task is a section. Default: false.'
      milestone:
        type: boolean
        example: true
        description: '(Optional) Whether this task is a milestone. Default: false.'
      asUser:
        type: boolean
        example: true
        description: |-
          (Optional) If true, marks this update as performed by the app.
          Default: false (updated by the authorizing user).
      followers:
        type: array
        example:
          - tzufRLqCnud74dARyDSvjWDl
          - app
        description: |-
          (Optional) Followers to replace the current followers (OID, ID, or email).

          Special values:
          - `"me"`: the current user
          - `"inherit"`: include followers of the parent task
          - `"app"`: the application follows (receives notifications)

          App follower syntax:
          - `app|team` or `app|team|channel`
          - `app|/path` ŌåÆ appended to the hook URL (e.g., `.../standard/soc1/33456/a7`).
        items:
          type: string
      successors:
        type: array
        example: '["#13"]'
        description: |-
          (Optional) Successors to replace the current successors (task OID or ID).

          IDs can be specified as `#id` or `id`. Integer IDs are also accepted.
        items:
          type: string
      yourField:
        type: object
        description: |-
          PLACEHOLDER ŌĆö do NOT send a key literally named `yourField`. Instead, use the custom field's own name (as defined via `/project/add-field`) as the JSON key, with a value matching the field's type:

          - Text / Email / Hyperlink: string.
          - Number / Money: numeric value (no currency symbol).
          - Checkbox: `true` or `false`.
          - Select: option name (string).
          - Date: ISO 8601 timestamp (`yyyy-MM-dd'T'HH:mm:ssZ`) or date-only (`yyyy-MM-dd`).
          - Duration: number of seconds.
          - **User**: user OID, user ID, or email ŌĆö server resolves to the user's OID.
          - **Task**: task OID, integer task ID, or `#<id>` string ŌĆö server resolves to the task's OID (scoped to this project).
          - Multi-value (fields configured with `multiple: true`): provide a list. Pass `null` to clear the field.

          Example body fragment: `{"Priority": 3, "Owners": ["alice", "bob@example.com"], "Depends": ["#42"]}`.
      addTags:
        type: array
        example:
          - X6nmx9XjEO2wKbqeB1pRT43C
        description: |-
          (Optional) Tags to add to this task (OID or name).
          Tag names are case-insensitive.
        items:
          type: string
      removeTags:
        type: array
        example:
          - mPAQrYU1qt8wAYAInKRlTnvl
        description: |-
          (Optional) Tags to remove from this task (OID or name).
          Tag names are case-insensitive.
        items:
          type: string
      addAssignees:
        type: array
        example:
          - 6QMKkEPBVWETLWrXqws94ALU
        description: |-
          (Optional) Assignees to add (OID, ID, or email).
          Special values:
          - "me": the current user
          - "inherit": include all assignees of the parent task
        items:
          type: string
      removeAssignees:
        type: array
        example:
          - Job4NSW9xK6Owcke8iKj7zyH
        description: |-
          (Optional) Assignees to remove (OID, ID, or email).

          Accepts the same special values as `addAssignees`: `"me"` (the current user) and `"inherit"` (all assignees of the parent task).
        items:
          type: string
      addFollowers:
        type: array
        example:
          - sfsvLbDVPvi1QMf2GkDn7VSy
        description: |-
          (Optional) Followers to add (OID, ID, or email).
          Special values:
          - "me": the current user
          - "inherit": include followers of the parent task
          - "app": the application follows (receives notifications)

          App follower syntax:
          - `app|team` or `app|team|channel`
          - `app|/path` ŌåÆ appended to the hook URL (e.g., `.../standard/soc1/33456/a7`).
        items:
          type: string
      removeFollowers:
        type: array
        example:
          - aBuz4MwfZ5CasOae6stnFa2f
        description: |-
          (Optional) Followers to remove (OID, ID, or email).

          Special values:
          - `"me"`: the current user
          - `"inherit"`: remove followers that were inherited from the parent task
          - `"app"`: the application

          App follower syntax:
          - `app|team` or `app|team|channel`
          - `app|/path` ŌåÆ appended to the hook URL.
        items:
          type: string
      addSuccessors:
        type: array
        example: '["#13"]'
        description: |-
          (Optional) Successors to add (task OID or ID).

          IDs can be specified as `#id` or `id`. Integer IDs are also accepted.
        items:
          type: string
      removeSuccessors:
        type: array
        example: '["#13"]'
        description: |-
          (Optional) Successors to remove (task OID or ID).

          IDs can be specified as `#id` or `id`. Integer IDs are also accepted.
        items:
          type: string
      name:
        type: string
        example: New idea
        description: (Optional) New task name.
      status:
        type: integer
        format: int32
