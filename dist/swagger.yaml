        '200':
          description: OK ŌĆö array of updated tasks (slots for not-found items are `null`).
          schema:
            type: array
            items:
              $ref: '#/definitions/Task'
        '400':
          description: Bad Request ŌĆö body not a JSON array, empty, over the 300-item cap, item shape error (both/neither oid+id, malformed ref), or any per-item validation failure (whole batch rolled back).
          schema:
            $ref: '#/definitions/ErrorResponse'
        '403':
          description: Forbidden ŌĆö caller lacks permission on the project or any task in the batch (whole batch rolled back).
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found ŌĆö project does not exist. (Item-level not-found is silent skip.)
          schema:
            $ref: '#/definitions/ErrorResponse'
        '413':
          description: Payload Too Large.
          schema:
            $ref: '#/definitions/ErrorResponse'
        '429':
          description: Too Many Requests ŌĆö the batch's rate-limit cost (`items.length` units) would exceed the caller's per-minute / per-hour API quota.
          schema:
            $ref: '#/definitions/ErrorResponse'
