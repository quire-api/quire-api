            Examples: `alice`, `alice,!bob`, `alice|bob`.
          required: false
          type: string
          x-example: alice
        - name: follower
          in: query
          description: |-
            Filter by follower. Each value is a user OID, user ID, or email. Combine with `,` (AND), `|` (OR), `!` (NOT); AND binds tighter than OR.

            Examples: `alice`, `alice,!bob`, `alice|bob`.
          required: false
          type: string
