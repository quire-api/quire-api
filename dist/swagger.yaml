    type: object
    properties:
      description:
        type: string
        example: '**Great** organization to start with.'
        description: (Optional) New description for this organization (Markdown supported).
      followers:
        type: array
        description: |-
          (Optional) Followers to replace the current followers of this organization (user OIDs).
          This replaces all existing followers. To modify incrementally, use `addFollowers` or `removeFollowers`.

          Accepts the same special values as `addFollowers`: `"me"` (the current user) and `"app"` / `"app|team"` / `"app|team|channel"` / `"app|/path"` (the application).
        items:
          type: string
      addFollowers:
        type: array
        description: |-
          (Optional) Followers to add to this organization (user OIDs).
          Special values:
          - "me": the current user follows the organization
          - "app": the application follows (receives notifications)

          App follower syntax:
          - `app|team` or `app|team|channel`
          - `app|/path` ŌåÆ appended to the hook URL when invoking the registered hook.
            Example: hook `https://super.app/hooks/standard` + follower `app|/soc1/33456/a7`
            ŌåÆ `https://super.app/hooks/standard/soc1/33456/a7`
        items:
          type: string
      removeFollowers:
        type: array
        description: |-
          (Optional) Followers to remove from this organization (user OIDs).
          Accepts the same special values as `addFollowers`: `"me"` (the current user) and `"app"` / `"app|team"` / `"app|team|channel"` / `"app|/path"` (the application).
        items:
          type: string
      name:
        type: string
