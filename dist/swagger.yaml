      summary: Get the subtasks of the given task.
      description: |-
        By default returns only the direct subtasks of `{taskId}` (one level). To fetch a whole subtree in a single call, set `?depth=N` or `?depth=full` ŌĆö each task in the response then carries a nested `tasks` field with its walked children, recursively.

        **When to use which:**
        - Default (no `?depth`): you only need the immediate children.
        - `?depth=2` or `3`: small subtree where you know the shape.
        - `?depth=full`: full subtree snapshot ŌĆö pair with `?return=compact` for navigation/lookup workloads to keep the payload (and LLM-token cost) small.

        **Per-tier total-nodes cap when `?depth>1`:** Free ŌåÆ rejected (`402`), Pro ŌåÆ 500, Premium ŌåÆ 2,000, Enterprise ŌåÆ unlimited (bounded only by the global response-size ceiling). When the cap fires mid-walk, the partial subtree is returned and the **last emitted sibling at the cropped level carries `"cropped": true`**. Recovery: call `GET /task/list/id/{prj}/{croppedSiblingParentId}` (default `?depth=1`) to fetch the rest of that level ŌĆö flat single-level lists have no cap.

        **Tree shape signals for the agent:**
        - Node has a `tasks` array ŌåÆ its children were walked. Empty array means a true leaf.
        - Node has no `tasks` field ŌåÆ its children were not walked (depth limit reached, or cap fired before reaching it). Drill in if you need them.
        - Node has `"cropped": true` ŌåÆ more siblings of this node exist at the same level.

        **Pagination** (flat path only, cannot be combined with `?depth>1`): pass `?limit=N` (1..1000) to opt into paginated chunks. When more results exist, the LAST item carries `"cursor": "<token>"` ŌĆö pass it back as `?cursor=<token>` (plus the same `?limit=` and `?status=`) for the next page. Without `?limit=` / `?cursor=`, the response is the full bare array. `?limit=no` is an explicit "return everything". Composes with `?return=compact`.

        **Notes:** Subtree responses (`?depth>1`) omit the per-task `childCount` field ŌĆö the `tasks` array is the canonical signal. The flat default (`?depth=1`) and single-task `GET /task/{oid}` still include `childCount`. `?depth>1` cannot be combined with `?limit=` or `?cursor=` (returns `400`).

        **Rate-limit cost** (#24558): proportional to the number of tasks returned across the whole tree ŌĆö `max(1, ceil(items / 100))` units. So a flat `?limit=100` (or fewer) costs 1; a `?depth=full` returning 500 nodes costs 5; a `?depth=full` returning 2,000 (Premium cap) costs 20.
      operationId: getSubtasks
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: ID of the task's project. Specify "-" for personal tasks in My Tasks.
          required: true
          type: string
          x-example: my_project
        - name: taskId
          in: path
          description: Parent task ID.
          required: true
          type: integer
          format: int32
          x-example: 42
        - name: status
          in: query
          description: Task status filter. Specify a value 0ŌĆō100, or use "active" for active tasks or "completed" for completed tasks.
          required: false
          type: string
          x-example: active
        - name: depth
          in: query
          description: Subtree depth. Omit or `1` for the default flat single-level list (immediate children only). Any positive integer returns a multi-level subtree capped at the given depth; `full` walks every level (bounded by the per-tier total-nodes cap). `?depth>1` requires the Professional plan or above and cannot be combined with `?limit`/`?cursor`.
          required: false
          type: string
          x-example: '2'
        - name: limit
          in: query
          description: Page size for the flat path (1..1000). Omit for the default unpaginated full list. Pass `no` to be explicit. When set and more results exist, the last item in the response carries a `cursor` field. Cannot be combined with `?depth>1`.
          required: false
          type: string
          x-example: '100'
        - name: cursor
          in: query
          description: Continuation token. Pass back the `cursor` value from the last item of the previous page to fetch the next page. Re-pass `?limit=` and any filter (`?status=`) on the same call. Cannot be combined with `?depth>1`.
          required: false
          type: string
        - name: return
          in: query
          description: Response shape. `full` (default) returns the standard task records; `compact` returns identifier-only items ŌĆö `{oid, id, tasks?, cropped?}` in subtree mode, `{oid, id, cursor?}` in flat / paginated mode. Pair with `?depth=full` (subtree) or `?limit=N` (paginated) to fetch a whole subtree's / page's identifier graph at minimal token cost; the agent then `GET /task/{oid}` for only the items it wants in detail.
          required: false
          type: string
          x-example: compact
          enum:
            - full
            - compact
      responses:
        '200':
          description: OK ŌĆö list of subtasks (may be empty). With `?depth>1`, each entry may carry nested `tasks` + `cropped` fields.
          schema:
            type: array
            items:
              $ref: '#/definitions/Task'
        '400':
          description: Bad Request ŌĆö invalid `depth` / `limit` value, `?depth>1` without a task ID in the URL, `?depth>1` combined with `?limit`/`?cursor`, or `?cursor=` doesn't belong to this list.
        '402':
          description: Payment Required ŌĆö `?depth>1` requires the Professional plan or above. Use `?depth=1` (or omit `?depth`) for unrestricted flat per-level listing.
        '404':
          description: Not Found ŌĆö project or parent task does not exist.
