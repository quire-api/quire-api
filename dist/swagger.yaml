      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: Project ID.
          required: true
          type: string
          x-example: my_project
      responses:
        '200':
          description: OK ŌĆö list of project members.
          schema:
            type: array
            items:
              $ref: '#/definitions/User'
        '404':
          description: Not Found ŌĆö project does not exist.
  /user/list/project/{oid}:
    get:
      tags:
        - user
      summary: Get all user records of the given project (by project OID).
      description: |-
        Returns all members of the specified project by project OID.
        If the current user did not grant the app access to contacts, only basic information is returned.
        The first record is always the current user.
      operationId: getUsersOfProjectByOid
      produces:
        - application/json
      parameters:
        - name: oid
          in: path
          description: Project OID.
          required: true
          type: string
      responses:
        '200':
          description: OK ŌĆö list of project members.
          schema:
            type: array
            items:
              $ref: '#/definitions/User'
        '404':
          description: Not Found ŌĆö project does not exist.
  /user/{oid}:
    get:
      tags:
        - user
      summary: Get a user by OID.
      description: Returns the full user record for the given OID.
      operationId: getUserByOid
      produces:
        - application/json
      parameters:
        - name: oid
          in: path
          description: User OID.
          required: true
          type: string
      responses:
        '200':
          description: OK ŌĆö user record.
          schema:
            $ref: '#/definitions/User'
        '404':
          description: Not Found ŌĆö user does not exist, or is not visible to the caller.
securityDefinitions:
  BasicAuth:
    type: basic
  OAuth2:
    type: oauth2
    authorizationUrl: https://quire.io/oauth
    tokenUrl: https://quire.io/oauth/token
    flow: accessCode
definitions:
  AddAppvCatBody:
    type: object
    required:
      - id
      - name
    properties:
      claimers:
        type: array
        description: |-
          (Optional) Users allowed to request approval in this category.

          - Omit or `null`: anyone can request.
          - `[]` (empty list): admins only.
          - List of user OIDs: those specific users.
        items:
          type: string
      approvers:
        type: array
        description: |-
          (Optional) Users allowed to approve, reject, or request changes in this category.

          - Omit or `null`: anyone can respond.
          - `[]` (empty list): admins only.
          - List of user OIDs: those specific users.
        items:
          type: string
      name:
        type: string
        example: Legal Review
        description: Display name.
      id:
        type: string
        example: legal
        description: Category identifier (URL-safe). Must be unique within the project. The identifier `""` is reserved for the implicit default category.
  AddFieldBody:
    type: object
    required:
      - name
      - type
    properties:
      options:
        type: array
        description: (Required for `select`) Option list.
        items:
          $ref: '#/definitions/FieldOption'
      hidden:
        type: boolean
        example: false
        description: (Optional) Hide this field from the task detail panel.
      lookup:
        type: object
        description: (Required for `lookup`) Map from lookup key to numeric value. Keys are OIDs of the configured `lookupType` entity (e.g. user OIDs when `lookupType=User`). Values are numbers.
        additionalProperties:
          $ref: '#/definitions/Number'
      conditionFormat:
        type: array
        description: (Optional) Conditional-format rules. Applicable to `date`, `number`, `money`, `duration`, `lookup`, and `formula` fields whose `resultType` resolves to one of those.
        items:
          $ref: '#/definitions/FieldConditionFormat'
      durationFormat:
        type: string
        example: hh:mm
        description: (Optional, `duration`/`formula` only) Duration display format.
        enum:
          - hh:mm:ss
          - hh:mm
          - 1h1m
          - 1h
          - 1d1h
          - dd:hh:mm:ss
          - dd:hh:mm
          - dd:hh
      private:
        type: boolean
        example: false
        description: (Optional) Restrict access to non-guest members only.
      withTime:
        type: boolean
        example: false
        description: (Optional, `date` only) Include time-of-day in addition to the date.
      formula:
        type: string
        example: SUM(Subtask.Amount)
        description: (Required for `formula`) Formula expression.
      ndecimal:
        type: integer
        format: int32
        example: 2
        description: (Optional, `number`/`money` only) Number of decimal digits. `-1` means no rounding.
        enum:
          - -1
          - 0
          - 1
          - 2
          - 3
      resultType:
        type: string
        example: number
        description: (Optional, `formula` only) Expected result type.
        enum:
          - text
          - number
          - money
          - date
          - duration
          - checkbox
      clearOnDup:
        type: boolean
        example: false
        description: (Optional) Clear this field when duplicating a task.
      lookupType:
        type: string
        example: User
        description: '(Optional, `lookup` only) Source type for lookup keys. Default: `User`.'
        enum:
          - User
          - Task
          - Project
          - Organization
      multiple:
        type: boolean
        example: true
        description: (Optional) Allow multiple values. Applies to `select`, `user`, `task`, and `file` (always true for `file`).
      name:
        type: string
        example: Priority
        description: Unique name for this field. Must be a non-empty string and must not contain `}`, `"`, or `\`.
      type:
        type: string
        example: number
        description: Field type. For insight views, only `formula` and `lookup` are accepted.
        enum:
          - text
          - number
          - money
          - date
          - duration
          - select
          - checkbox
          - user
          - task
          - hyperlink
          - email
          - formula
          - file
          - lookup
      percent:
        type: boolean
        example: false
        description: (Optional, `number` only) Format the value as a percentage.
      currency:
        type: string
        example: USD
        description: (Optional, `money`/`formula` only) Currency symbol. When omitted on a money field, defaults to `$`.
  AddTimelogBody:
    type: object
    required:
      - end
      - start
    properties:
      end:
        type: string
        example: '2026-04-26T10:30:00Z'
        description: End timestamp (ISO 8601, UTC). Must be on or after `start`. Sub-second precision is truncated to whole seconds.
      start:
        type: string
        example: '2026-04-26T09:00:00Z'
        description: Start timestamp (ISO 8601, UTC). Sub-second precision is truncated to whole seconds.
      user:
        type: string
        example: john.doe@example.com
        description: (Optional) User identifier (OID, ID, or email) the log is credited to. Omitted, `null`, or empty defaults to the authenticated caller. Unknown users return `400 Bad Request`.
      billable:
        type: boolean
        example: true
        description: (Optional) Whether this log is billable. Omitted or `null` defaults to `true`.
      note:
        type: string
        example: Pair-programming session
        description: (Optional) Free-form note for the log. Omitted, `null`, or empty stores no note.
  Approval:
    type: object
    properties:
      toggledAt:
        type: string
        example: '2026-04-24T10:05:00.000Z'
        description: Timestamp (UTC, ISO 8601) of the last state transition.
      category:
        type: string
        example: legal
        description: Identifier of the approval category this approval belongs to. The default category has id `""`.
      requester:
        type: string
        description: OID of the user who originally requested approval. Preserved across subsequent approve / reject / change transitions.
      approver:
        type: string
        description: OID of the user who most recently approved / rejected / requested changes. Null while `state` is `awaiting`.
      state:
        type: string
        example: awaiting
        description: |-
          Current approval state. Derived from the last POST to `/task/approve/id/{projectId}/{taskId}` (or the OID form):
          - `awaiting` ŌĆö `request` was posted (initial or rolled-back).
          - `approved` ŌĆö `approve` was posted.
          - `rejected` ŌĆö `reject` was posted.
          - `changes` ŌĆö `change` (request-for-changes) was posted.
        enum:
          - awaiting
          - approved
          - rejected
          - changes
  AppvCat:
    type: object
    properties:
      name:
        type: string
        example: Legal Review
        description: Display name.
      id:
        type: string
        example: legal
        description: Category identifier (URL-safe). The implicit default category has an empty id.
      claimers:
        type: array
        position: 20
        description: |-
          Users allowed to request approval in this category.

          - Omitted from the response: anyone can request.
          - `[]` (empty list): admins only.
          - List of user OIDs: those specific users.
        items:
          type: string
      approvers:
        type: array
        position: 20
        description: |-
          Users allowed to approve, reject, or request changes in this category.

          - Omitted from the response: anyone can respond.
          - `[]` (empty list): admins only.
          - List of user OIDs: those specific users.
        items:
          type: string
      createdAt:
        type: string
        example: '2026-04-24T10:00:00.000Z'
        position: 90
        description: Timestamp (UTC, ISO 8601) when this category was created.
      createdBy:
        position: 90
        description: User who created this category.
        $ref: '#/definitions/SimpleIdentity'
  Attachment:
    type: object
    properties:
      type:
        type: integer
        format: int32
        example: 2
        description: Attachment source type. 1 = Google Drive, 2 = Quire storage.
      url:
        type: string
        example: https://quire.io/att/Ta/sdcQOGgeUtyaFFzb9p0IwAgi/qfqVmUtC/image.png
        description: Direct URL to access this attachment.
      name:
        type: string
        example: file.txt
        description: File name of the attachment.
      length:
        type: integer
        format: int32
        example: 20000
        description: Size of the attachment in bytes.
      createdAt:
        type: string
        example: '2018-12-22T02:06:58.158Z'
        position: 99
        description: Creation timestamp in UTC (ISO 8601).
      createdBy:
        position: 99
        description: User who created this record.
        $ref: '#/definitions/SimpleIdentity'
  BulkUpdateTaskItem:
    type: object
    properties:
      oid:
        type: string
        example: iuRRiKoyrxdBFhFTTo
        description: Target task OID. Exactly one of `oid` / `id` must be supplied per item.
      id:
        type: integer
        format: int32
        example: 42
        description: Target task ID. Exactly one of `oid` / `id` must be supplied per item.
      description:
        type: string
        example: This is a **cool** task.
        description: (Optional) New task description.
      tags:
        type: array
        example: '["urgent", "design"]'
        description: |-
          (Optional) Tags to replace the current tags on this task (OID or name).
          This replaces all existing tags. To modify incrementally, use `addTags` or `removeTags`.
          Tag names are case-insensitive.
        items:
          type: string
      start:
        type: string
        example: '2018-12-20T00:00:00.000Z'
        description: |-
          (Optional) Start date/time in UTC.

          - With time: `yyyy-MM-dd'T'HH:mmZ` (e.g., `2020-10-30T09:30Z`).
          - Date only: `yyyy-MM-dd` (e.g., `2020-10-30`).

          Notes:
          - Seconds are not supported.
          - `2020-10-30T00:00:00` is treated as `2020-10-30` (date only).
          - To specify exactly midnight UTC, use `2020-10-30T00:00` (no seconds).
      due:
        type: string
        example: '2018-12-22T00:00:00.000Z'
        description: |-
          (Optional) Due date/time in UTC.

          - With time: `yyyy-MM-dd'T'HH:mmZ` (e.g., `2020-10-30T09:30Z`).
          - Date only: `yyyy-MM-dd` (e.g., `2020-10-30`).

          Notes:
          - Seconds are not supported.
          - `2020-10-30T00:00:00` is treated as `2020-10-30` (date only).
          - To specify exactly midnight UTC, use `2020-10-30T00:00` (no seconds).
      assignees:
        type: array
        example: '["me", "alice@example.com"]'
        description: |-
          (Optional) Assignees to replace the current assignees (OID, ID, or email).
          This replaces all existing assignees. To modify incrementally, use `addAssignees` or `removeAssignees`.

          Accepts the same special values as `addAssignees`: `"me"` (the current user) and `"inherit"` (all assignees of the parent task).
        items:
          type: string
      recurrence:
        description: |-
          (Optional) Recurrence details. `null` if the task is not recurring.

          - `freq`: `daily`, `weekly`, `monthly`, `yearly`.
          - `interval`: Interval between occurrences. Default: 1.
          - `until`: End date. Default: never ends.
          - `bymonth`: Month (1 = January). Supported only with `yearly`. Default: 1.
          - `byweekno`: Week number (starting from 1) or `last`. Supported with `monthly`/`yearly`.
          - `byweekday`: Day(s) of week (0 = Monday ... 6 = Sunday). For weekly, use a list (e.g., `[1]`, `[0,3]`).
          - `bydayno`: Day of month (1 = first day). Supported with `monthly`/`yearly`.
            Note: `byweekday` and `bydayno` cannot both be specified.
          - `dupsubtasks`: Duplicate subtasks when the task is completed. Default: true.
          - `sincelatest`: Daily only. Repeat based on the last completion date. Default: false.
        $ref: '#/definitions/Recurrence'
      peekaboo:
        type: object
        example: 'true'
        description: |-
          (Optional) Peekaboo setting. Accepts a boolean or a positive integer:

          - `true`: Hide indefinitely (task and subtasks).
          - positive integer: Number of days to hide.
          - `false`: Undo previous peekaboo.

          Default: false.
      section:
        type: boolean
        example: true
        description: '(Optional) Whether this task is a section. Default: false.'
      milestone:
        type: boolean
        example: true
        description: '(Optional) Whether this task is a milestone. Default: false.'
      asUser:
        type: boolean
        example: true
        description: |-
          (Optional) If true, marks this update as performed by the app.
          Default: false (updated by the authorizing user).
      followers:
        type: array
        example: '["bob@example.com"]'
        description: |-
          (Optional) Followers to replace the current followers (OID, ID, or email).

          Special values:
          - `"me"`: the current user
          - `"inherit"`: include followers of the parent task
          - `"app"`: the application follows (receives notifications)

          App follower syntax:
          - `app|team` or `app|team|channel`
          - `app|/path` ŌåÆ appended to the hook URL (e.g., `.../standard/soc1/33456/a7`).
        items:
          type: string
      successors:
        type: array
        example: '["#13"]'
        description: |-
          (Optional) Successors to replace the current successors (task OID or ID).

          IDs can be specified as `#id` or `id`. Integer IDs are also accepted.
        items:
          type: string
      yourField:
        type: object
        description: |-
          PLACEHOLDER ŌĆö do NOT send a key literally named `yourField`. Instead, use the custom field's own name (as defined via `/project/add-field`) as the JSON key, with a value matching the field's type:

          - Text / Email / Hyperlink: string.
          - Number / Money: numeric value (no currency symbol).
          - Checkbox: `true` or `false`.
          - Select: option name (string).
          - Date: ISO 8601 timestamp (`yyyy-MM-dd'T'HH:mm:ssZ`) or date-only (`yyyy-MM-dd`).
          - Duration: number of seconds.
          - **User**: user OID, user ID, or email ŌĆö server resolves to the user's OID.
          - **Task**: task OID, integer task ID, or `#<id>` string ŌĆö server resolves to the task's OID (scoped to this project).
          - Multi-value (fields configured with `multiple: true`): provide a list. Pass `null` to clear the field.

          Example body fragment: `{"Priority": 3, "Owners": ["alice", "bob@example.com"], "Depends": ["#42"]}`.
      addTags:
        type: array
        example: '["urgent"]'
        description: |-
          (Optional) Tags to add to this task (OID or name).
          Tag names are case-insensitive.
        items:
          type: string
      removeTags:
        type: array
        example: '["draft"]'
        description: |-
          (Optional) Tags to remove from this task (OID or name).
          Tag names are case-insensitive.
        items:
          type: string
      addAssignees:
        type: array
        example: '["me"]'
        description: |-
          (Optional) Assignees to add (OID, ID, or email).
          Special values:
          - "me": the current user
          - "inherit": include all assignees of the parent task
        items:
          type: string
      removeAssignees:
        type: array
        example: '["alice@example.com"]'
        description: |-
          (Optional) Assignees to remove (OID, ID, or email).

          Accepts the same special values as `addAssignees`: `"me"` (the current user) and `"inherit"` (all assignees of the parent task).
        items:
          type: string
      addFollowers:
        type: array
        example: '["me"]'
        description: |-
          (Optional) Followers to add (OID, ID, or email).
          Special values:
          - "me": the current user
          - "inherit": include followers of the parent task
          - "app": the application follows (receives notifications)

          App follower syntax:
          - `app|team` or `app|team|channel`
          - `app|/path` ŌåÆ appended to the hook URL (e.g., `.../standard/soc1/33456/a7`).
        items:
          type: string
      removeFollowers:
        type: array
        example: '["bob@example.com"]'
        description: |-
          (Optional) Followers to remove (OID, ID, or email).

          Special values:
          - `"me"`: the current user
          - `"inherit"`: remove followers that were inherited from the parent task
          - `"app"`: the application

          App follower syntax:
          - `app|team` or `app|team|channel`
          - `app|/path` ŌåÆ appended to the hook URL.
        items:
          type: string
      addSuccessors:
        type: array
        example: '["#13"]'
        description: |-
          (Optional) Successors to add (task OID or ID).

          IDs can be specified as `#id` or `id`. Integer IDs are also accepted.
        items:
          type: string
      removeSuccessors:
        type: array
        example: '["#13"]'
        description: |-
          (Optional) Successors to remove (task OID or ID).

          IDs can be specified as `#id` or `id`. Integer IDs are also accepted.
        items:
          type: string
      name:
        type: string
        example: New idea
        description: (Optional) New task name.
      status:
        type: integer
        format: int32
        example: 100
        position: 4
        description: (Optional) New status, between 0 and 100. Specify 100 to complete the task.
      etc:
        type: integer
        format: int32
        example: 0
        position: 4
        description: |-
          (Optional) Estimated time to complete, in seconds. Must be non-negative or `null`.
          Specify `null` to clear the value.
      priority:
        type: integer
        format: int32
        example: 0
        position: 4
        description: (Optional) New priority. `-1` (lowest) through `2` (highest); `0` is Normal. (The server also accepts the case-insensitive English names `Low`, `Medium`, `High`, `Urgent`, but the integer form is recommended for typed callers.)
        enum:
          - -1
          - 0
          - 1
          - 2
      sourceRef:
        type: object
        example: '{"text": "Source: [Gmail](https://gmail.com/link)"}'
        position: 60
        description: |-
          (Optional) Arbitrary source reference data to store with the task. Available via API on retrieval.

          If the map contains `text`, its value will be displayed client-side and should be Markdown. Including a source link is recommended.
        additionalProperties:
          type: object
  Change:
    type: object
    required:
      - task
    properties:
      exclude:
        type: boolean
        example: false
        description: 'Whether to exclude the task. Default: false (include).'
      single:
        type: boolean
        example: false
        description: 'Whether the operation applies only to the specified task. Default: false ŌĆö all descendant tasks are also included or excluded. Note: this does not change descendants that were explicitly included or excluded in prior operations.'
      task:
        type: string
        example: 2MmYOpJH_ZLeehIjjytH1Rwr
        description: OID of the task to include or exclude.
  Chat:
    type: object
    properties:
      url:
        type: string
        example: https://quire.io/w/my_project?chat=Highlight101
        description: URL of this chat on the Quire website.
      nameText:
        type: string
        example: Highlight 101
        description: Name with Markdown removed.
      nameHtml:
        type: string
        example: Highlight 101
        description: Name rendered as an HTML fragment converted from Markdown.
      name:
        type: string
        example: Highlight 101
        description: Display name (Markdown supported).
      id:
        type: string
        example: Highlight101
        description: ID.
      description:
        type: string
        example: This is *cool*!
        description: Description (Markdown supported).
      descriptionText:
        type: string
        example: This is cool!
        description: Description with Markdown removed.
      descriptionHtml:
        type: string
        example: This is <i>cool</i>!
        description: Description rendered as an HTML fragment converted from Markdown.
      iconColor:
        type: string
        example: '37'
        description: 'Color index for the icon from QuireŌĆÖs predefined palette. Two-digit code: first digit 0ŌĆō5, second digit 0ŌĆō7 (e.g., `37`).'
      image:
        type: string
        example: https://quire.s3.amazonaws.com/oid/image.jpg
        description: Image URL representing this record.
        allowEmptyValue: true
      oid:
        type: string
        example: Dyh2YkFcu9uLgLFIeN1kB4Ld
        description: Object identifier (OID), a UUID-like unique string.
      partner:
        position: 15
        description: External team this record belongs to. Null if the record is not accessible to external-team members.
        $ref: '#/definitions/SimpleTaggingEntity'
      start:
        type: string
        example: '2024-01-02'
        position: 50
        description: Target start date for this record, or null if not specified.
      due:
        type: string
        example: '2024-05-25'
        position: 50
        description: Target due date for this record, or null if not specified.
      archivedAt:
        type: string
        example: '2020-02-22T02:06:58.158Z'
        position: 50
        description: Timestamp (UTC, ISO 8601) when this record was archived. Null if not archived.
      owner:
        position: 99
        description: Project this chat channel belongs to.
        $ref: '#/definitions/ChatOwner'
      createdAt:
        type: string
        example: '2018-12-22T02:06:58.158Z'
        position: 99
        description: Creation timestamp in UTC (ISO 8601).
      createdBy:
        position: 99
        description: User who created this record.
        $ref: '#/definitions/SimpleIdentity'
  ChatOwner:
    type: object
    properties:
      url:
        type: string
        example: https://quire.io/w/prj_id
        description: URL of this owner on the Quire website.
      type:
        type: string
        example: Project
        description: Type of the owning object (e.g., Project).
      id:
        type: string
        example: my_id
        description: Identifier for this record.
      iconColor:
        type: string
        example: '37'
        description: 'Color index for the icon from QuireŌĆÖs predefined palette. Two-digit code: first digit 0ŌĆō5, second digit 0ŌĆō7 (e.g., `37`).'
      image:
        type: string
        example: https://quire.s3.amazonaws.com/oid/image.jpg
        description: Image URL representing this record.
        allowEmptyValue: true
      name:
        type: string
        example: Foo
        description: Display name.
      oid:
        type: string
        example: Dyh2YkFcu9uLgLFIeN1kB4Ld
        description: Object identifier (OID), a UUID-like unique string.
  Comment:
    type: object
    properties:
      oid:
        type: string
        example: iDsPd.QP_qM.hN.Trymukn8b
        description: Object identifier (OID), a UUID-like unique string.
      description:
        type: string
        example: It is *cool*!
        position: 1
        description: Comment content (Markdown supported).
      descriptionText:
        type: string
        example: It is cool!
        position: 1
        description: Comment content with Markdown removed.
      descriptionHtml:
        type: string
        example: It is <i>cool</i>!
        position: 1
        description: Comment content rendered as an HTML fragment converted from Markdown.
      attachments:
        type: array
        position: 8
        description: Attachments associated with this comment.
        items:
          $ref: '#/definitions/Attachment'
      url:
        type: string
        position: 50
        description: URL of this comment on the Quire website.
      pinAt:
        type: string
        example: '2018-12-22T02:06:58.158Z'
        position: 50
        description: Timestamp (UTC, ISO 8601) when this comment was pinned, or null if not pinned.
