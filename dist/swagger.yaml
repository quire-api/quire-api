  /task/bulk-transfer/id/{sourceProjectId}:
    put:
      tags:
        - task
      summary: Bulk-transfer N tasks across projects by ID.
      description: |-
        Transfers up to **300 tasks** from the source project (URL path) to a different target project (`?project=`) in one transaction. Same query-param grammar as single-task `PUT /task/transfer/...`:
        - `?project={target}` (required) ŌĆö target project ID, or `-` for the user's Inbox.
        - `?task={ref}` (optional) ŌĆö destination anchor in the target project. Omitted, empty, or `root` ŌåÆ items become root tasks of the target.
        - `?position=` ŌĆö `parent` (default), `before`, or `after`.
        - `?invite`, `?tag`, `?status`, `?custom-field` ŌĆö auto-remap flags, all default `true`.

        Items in the **body** use the bulk mixed-form convention (OID / integer ID / `#<id>` string) ŌĆö same as bulk-remove / bulk-move.

        Example: `PUT /task/bulk-transfer/id/my_project?project=archive_2026&task=root&return=compact`

        Request body (mixed-form refs):

        ```json
        [ 42, "#99", "iuRRiKoyrxdBFhFTTo" ]
        ```

        Response (compact mode; OIDs are preserved across transfer, IDs are reassigned from the target's counter):

        ```json
        [
          { "oid": "abc1Foo",            "id": 7 },
          null,
          { "oid": "iuRRiKoyrxdBFhFTTo", "id": 8 }
        ]
        ```

        **Atomic on real bugs**: validation / permission / DB errors propagate as `{code, message}` with `items[i]:` prefix and roll back **both** source and target locks.

        **Skip-not-found**: items not in the source project (already in target / in another project / removed / never existed) are silently skipped ŌĆö the response slot is `null`.

        **Source == target**: if `?project=` resolves to the same project as the URL source, the whole batch is rejected with `400` (use `bulk-move` for within-project reorder).

        **Order preservation (sliding chain)**: items are transferred in submitted order ŌĆö items 1..N-1 land *after the previous successful transfer*, regardless of `?position=`.

        **Rate-limit cost**: each bulk call costs `N` units against the per-minute / per-hour API quota, where `N` is `items.length` ŌĆö same total cost as `N` equivalent single-task transfers.
      operationId: bulkTransferTaskById
      produces:
        - application/json
      parameters:
        - name: sourceProjectId
          in: path
          description: Source project ID.
          required: true
          type: string
          x-example: my_project
        - in: body
          name: body
          description: Task references to be transferred. Each element is a task OID (string), an integer ID, or a `"#<id>"` string. Mixed forms allowed.
          required: true
          schema:
            type: array
            items:
              type: object
        - name: project
          in: query
          description: Target project ID. Specify `-` for the user's Inbox.
          required: true
          type: string
          x-example: archive_2026
        - name: task
          in: query
          description: (Optional) Reference task ID in the target project (destination anchor for the whole batch), or `root` to transfer items to the target project's root.
          required: false
          type: string
          x-example: '500'
        - name: position
          in: query
          description: '(Optional) Placement of transferred items relative to the reference: `parent` (default), `before`, or `after`. `before` / `after` require `?task=` to refer to a task (not `root`).'
          required: false
          type: string
          x-example: parent
          enum:
            - parent
            - before
            - after
        - name: invite
          in: query
          description: (Optional, default `true`) Auto-invite assignees to the target project if not already members.
          required: false
          type: string
          x-example: 'true'
        - name: tag
          in: query
          description: (Optional, default `true`) Auto-create tags in the target project if not already present.
          required: false
          type: string
          x-example: 'true'
        - name: status
          in: query
          description: (Optional, default `true`) Auto-remap statuses to the target project.
          required: false
          type: string
          x-example: 'true'
        - name: custom-field
          in: query
          description: (Optional, default `true`) Auto-create / remap non-empty custom fields in the target project.
          required: false
          type: string
          x-example: 'true'
        - name: return
          in: query
          description: (Optional) Response shape ŌĆö `full` (default) or `compact`.
          required: false
          type: string
          x-example: compact
          enum:
            - full
            - compact
      responses:
        '200':
          description: OK ŌĆö array of transferred tasks (slots for not-found items are `null`).
          schema:
            type: array
            items:
              $ref: '#/definitions/TaskWithParentInfo'
        '400':
          description: Bad Request ŌĆö body not a JSON array, empty, over the 300-item cap, item shape error, missing `?project=`, invalid `?position=`, `?task=root&position=before|after`, `?project=` resolves to the URL source project, or any per-item validation failure. Whole batch rolled back.
          schema:
            $ref: '#/definitions/ErrorResponse'
        '403':
          description: Forbidden ŌĆö caller lacks permission on the source or target project, or on any individual task in the batch. Whole batch rolled back.
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found ŌĆö source project, target project, or `?task=` reference does not exist. (Item-level not-found is silent skip.)
          schema:
            $ref: '#/definitions/ErrorResponse'
        '413':
          description: Payload Too Large.
          schema:
            $ref: '#/definitions/ErrorResponse'
        '429':
          description: Too Many Requests ŌĆö the batch's rate-limit cost (`items.length` units) would exceed the caller's per-minute / per-hour API quota.
          schema:
            $ref: '#/definitions/ErrorResponse'
