            Examples:
            - `alice` ŌĆö a single user (by ID)
            - `alice@example.com` ŌĆö by email
            - `alice,bob` ŌĆö assigned to both
            - `alice|bob` ŌĆö assigned to either
            - `alice,!bob` ŌĆö assigned to alice but not bob
            - `alice,bob|carol` ŌĆö `(alice AND bob) OR carol`
          required: false
