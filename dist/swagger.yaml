  /task/approve/id/{projectId}/{taskId}:
    post:
      tags:
        - task
      summary: Set or transition a task's approval state.
      description: |-
        Sets the task's [approval](#definition-Approval), or transitions it from its current state. The `?state=` query parameter selects the transition:
        - `request` ŌĆö request approval, or roll forward from `approved` / `rejected` / `changes` back to `awaiting`.
        - `approve` / `reject` / `change` ŌĆö approver's decision.

        The caller must be a claimer (for `request`) or an approver (for `approve` / `reject` / `change`) of the category. The original requester is preserved across `approve` / `reject` / `change` transitions.

        Example: `POST /task/approve/id/my_project/42?category=Legal&state=approve` (the request body is unused and may be empty).

        To cancel an approval, use `DELETE /task/revoke-approval/id/{projectId}/{taskId}`.

        Returns `400 Bad Request` if `?state=` is missing or unknown; `403 Forbidden` if the caller isn't a claimer / approver; `404 Not Found` if the task or `?category=` doesn't exist.
      operationId: approveTaskById
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: Project ID.
          required: true
          type: string
          x-example: my_project
        - name: taskId
          in: path
          description: Task ID.
          required: true
          type: integer
          format: int32
          x-example: 42
        - name: state
          in: query
          description: Approval transition to apply. Same vocabulary as `bulk-approve`.
          required: true
          type: string
          x-example: approve
          enum:
            - request
            - approve
            - reject
            - change
        - name: category
          in: query
          description: (Optional) Approval category ID. Defaults to the project's default category (id `""`).
          required: false
          type: string
          x-example: Legal
        - name: return
          in: query
          description: '(Optional) Response shape: `full` (default) for the full approval record, or `compact` for identifiers only (`{"oid": <taskOid>, "id": <taskId>}`). See API description for `?return=` semantics.'
          required: false
          type: string
          x-example: compact
          enum:
            - full
            - compact
      responses:
        '200':
          description: successful operation
          schema:
            $ref: '#/definitions/Approval'
