  /task/bulk-move/id/{projectId}:
    put:
      tags:
        - task
      summary: Bulk-move N tasks within a project by ID.
      description: |-
        Repositions up to **300 tasks** within a project to the same destination anchor in one transaction. Same query-param grammar as single-task `PUT /task/move/...`:
        - `?task=root` ŌĆö move items to project root (only valid with default `?position=parent`).
        - `?task={ref}&position=parent` (default) ŌĆö items become children of the reference task.
        - `?task={ref}&position=before` ŌĆö items become siblings immediately before the reference.
        - `?task={ref}&position=after` ŌĆö items become siblings immediately after the reference.

        `{ref}` follows the URL grammar (same as single-task move): the by-ID URL form expects an integer task ID (or `root`); the by-OID form expects a task OID. Items in the **body** use the bulk mixed-form convention (OID / integer ID / `#<id>` string) ŌĆö same as bulk-remove.

        Example: `PUT /task/bulk-move/id/my_project?task=99&return=compact`

        Request body (mixed-form refs):

        ```json
        [ 42, "#17", "iuRRiKoyrxdBFhFTTo" ]
        ```

        Response (compact mode; slot 1 was already removed by another caller, so it's `null`):

        ```json
        [
          { "oid": "abc1Foo", "id": 42 },
          null,
          { "oid": "iuRRiKoyrxdBFhFTTo", "id": 88 }
        ]
        ```

        **Atomic on real bugs**: validation / permission / DB errors (cycle detection ŌĆö making a task its own ancestor ŌĆö throws `400`) propagate as `{code, message}` with `items[i]:` prefix and roll back the whole batch.

        **Skip-not-found**: items whose target task can't be resolved (already removed, never existed, cascade-removed by an earlier item, in a different project, etc.) are silently skipped ŌĆö the corresponding response slot is `null`. Idempotent for agents.

        **Order preservation (sliding chain)**: items are moved in submitted order. Items 1..N-1 are positioned *after the previous successful move*, regardless of the URL `?position=` ŌĆö without this, `?position=after R` would reverse the batch.

        **Rate-limit cost**: each bulk call costs `N` units against the per-minute / per-hour API quota, where `N` is `items.length` ŌĆö same total cost as `N` equivalent single-task moves.

        All items must belong to the project in the URL. Cross-project moves go through bulk-transfer (see #24555).
      operationId: bulkMoveTaskById
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: Project ID.
          required: true
          type: string
          x-example: my_project
        - in: body
          name: body
          description: Task references to be moved. Each element is a task OID (string), an integer ID, or a `"#<id>"` string. Mixed forms allowed.
          required: true
          schema:
            type: array
            items:
              type: object
        - name: task
          in: query
          description: Reference task ID (the destination anchor for the whole batch), or `root` to move items to the project root.
          required: true
          type: string
          x-example: '99'
        - name: position
          in: query
          description: '(Optional) Placement of moved items relative to the reference: `parent` (default), `before`, or `after`. `before` / `after` require `?task=` to refer to a task (not `root`).'
          required: false
          type: string
          x-example: after
          enum:
            - parent
            - before
            - after
        - name: return
          in: query
          description: (Optional) Response shape ŌĆö `full` (default) or `compact`.
          required: false
          type: string
          x-example: compact
          enum:
            - full
            - compact
      responses:
        '200':
          description: OK ŌĆö array of moved tasks (slots for not-found items are `null`).
          schema:
            type: array
            items:
              $ref: '#/definitions/TaskWithParentInfo'
        '400':
          description: Bad Request ŌĆö body not a JSON array, empty, over the 300-item cap, item shape error, missing `?task=`, invalid `?position=`, `?task=root&position=before|after`, cycle detection (item is an ancestor of `?task=`), or cross-project ref. Whole batch rolled back.
          schema:
            $ref: '#/definitions/ErrorResponse'
        '403':
          description: Forbidden ŌĆö caller lacks permission on the project or any task in the batch (whole batch rolled back).
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found ŌĆö project (URL scope) or `?task=` reference does not exist. (Item-level not-found is silent skip.)
          schema:
            $ref: '#/definitions/ErrorResponse'
        '413':
          description: Payload Too Large.
          schema:
            $ref: '#/definitions/ErrorResponse'
        '429':
          description: Too Many Requests ŌĆö the batch's rate-limit cost (`items.length` units) would exceed the caller's per-minute / per-hour API quota.
          schema:
            $ref: '#/definitions/ErrorResponse'
