            Examples: `today`, `last7d`, `ge:2026-04-01T00:00:00Z`, `between:2026-04-01T00:00:00Z,2026-04-30T23:59:59Z`.
          required: false
          type: string
          x-example: ge:2026-04-01T00:00:00Z
        - name: edited
          in: query
          description: |-
            Filter by the task's `editedAt` timestamp. Same grammar as `created`. Note: `editedAt` is `NULL` for tasks that have never been edited after creation; such tasks are excluded by every op (use `created` to filter by creation time).

            Examples: `today`, `last7d`, `ge:2026-04-01T00:00:00Z`.
          required: false
          type: string
          x-example: last7d
        - name: archived
          in: query
          description: |-
            Filter by the task's `archivedAt` timestamp. Same grammar as `created`, plus null ops since the field is nullable:
            - `isNull` ŌĆö not archived
            - `isNotNull` ŌĆö archived (any time)

            Examples: `isNotNull`, `today`, `ge:2026-04-01T00:00:00Z`.
          required: false
          type: string
          x-example: isNotNull
        - name: unarchived
          in: query
          description: |-
            Filter by the task's `reshowAt` timestamp (scheduled un-archive). Same grammar as `archived` (supports `isNull` / `isNotNull`).

            Examples: `isNotNull`, `today`, `between:2026-04-01T00:00:00Z,2026-04-30T23:59:59Z`.
          required: false
          type: string
          x-example: isNotNull
        - name: toggled
          in: query
          description: |-
            Filter by the task's `toggledAt` timestamp (when its completion status was last changed). Same grammar as `archived` (supports `isNull` / `isNotNull`).

            Examples: `today`, `isNotNull`, `ge:2026-04-01T00:00:00Z`.
          required: false
          type: string
          x-example: today
        - name: start
          in: query
          description: |-
            Filter by the task's `start` date/time. Value grammar:
            - Keyword: `past`, `yesterday`, `today`, `tomorrow`, `upcoming`, `last7d`, `next7d`, `lastWeek`, `thisWeek`, `nextWeek`
            - Value op: `{ge|gt|le|lt|eq|ne}:<value>` or `{between|notBetween}:<value>,<value>`
            - Null op: `isNull`, `isNotNull`
            - `<value>` is either a date (`YYYY-MM-DD`) or a full ISO 8601 timestamp (`YYYY-MM-DDTHH:MM:SSZ`)
            - A date operand expands to a whole-day window in the caller's timezone (`ge:2026-04-01` means "on or after Apr 1 in the caller's calendar"); `gt:D`/`le:D` use end-of-day, `lt:D`/`ge:D` use start-of-day
            - `past` on `start`/`due` is `< today 00:00` in the caller's timezone (not `< now()`)
            - `upcoming` on `start`/`due` is the window `[tomorrow, today + 7 days)`

            Examples: `today`, `upcoming`, `ge:2026-04-01`, `between:2026-04-01,2026-04-30`, `isNull`.
          required: false
          type: string
          x-example: ge:2026-04-01
        - name: due
          in: query
          description: |-
            Filter by the task's `due` date/time. Same grammar and semantics as `start` (accepts date-only operands, `isNull`/`isNotNull`, and the same keyword/value ops).

            Examples: `today`, `upcoming`, `le:2026-04-30`, `isNotNull`.
          required: false
          type: string
          x-example: today
        - name: limit
          in: query
          description: |-
            Maximum number of tasks to return. Default: 30. Use `no` to return all matches.

            Note: On free plans, this cannot exceed 30 or `no` (unlimited).
          required: false
          type: string
          x-example: 'no'
      responses:
        '200':
          description: OK ŌĆö matching tasks (may be empty). With `?limit=N`, the last item may carry a `cursor` field if more results exist.
          schema:
            type: array
            items:
              $ref: '#/definitions/TaskWithParentInfo'
        '400':
          description: Bad Request ŌĆö invalid query params (incl. malformed `cursor`).
        '403':
          description: Forbidden ŌĆö caller lacks permission to search this project.
        '404':
          description: Not Found ŌĆö project does not exist.
  /task/transfer/id/{projectId}/{taskId}:
    put:
      tags:
        - task
      summary: Transfer an existing task by its ID to another project.
      description: |-
        Transfers an existing task to another project, optionally positioning it relative to an existing task in the target (`?task=` + `?position=`).

        Examples:
        - `PUT /task/transfer/id/my_project/42?project=archive` ŌĆö transfer to root of target project.
        - `PUT /task/transfer/id/my_project/42?project=archive&task=99` ŌĆö transfer as a child of task 99 in target.
        - `PUT /task/transfer/id/my_project/42?project=archive&task=99&position=before` ŌĆö transfer and place before task 99.
        - `PUT /task/transfer/id/my_project/42?project=-` ŌĆö transfer to the user's Inbox.

        Returns the updated task record.
      operationId: transferTaskById
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: ID of the task's project. Specify "-" for personal tasks in My Tasks.
          required: true
          type: string
          x-example: my_project
        - name: taskId
          in: path
          description: Task ID to be transferred.
          required: true
          type: integer
          format: int32
          x-example: 42
        - name: project
          in: query
          description: ID of the target project to which the task will be transferred. Specify "-" for personal tasks in My Tasks.
          required: true
          type: string
          x-example: my_archive
        - name: task
          in: query
          description: |-
            (Optional) ID of a reference task in the **target** project. How it's used depends on `position`:
            - `parent` (default): the transferred task becomes a child of `task`.
            - `before` / `after`: the transferred task is placed as a sibling, under `task`'s parent.

            If omitted (or `root`), the transferred task becomes a root task in the target project.
          required: false
          type: string
          x-example: '253'
        - name: position
          in: query
          description: |-
            (Optional) Placement relative to `task` in the target project:
            - `parent` (default): child of `task`.
            - `before`: sibling immediately before `task`.
            - `after`: sibling immediately after `task`.

            Omitted or empty ŌåÆ same as `parent`. Any other value returns `400 Bad Request`. `before` / `after` require `task` to refer to a task (not omitted, not `root`).
          required: false
          type: string
          x-example: before
          enum:
            - parent
            - before
            - after
        - name: invite
          in: query
          description: |-
            Whether to invite assignees to the target project if they are not already members.

            If omitted, `true` is assumed. Specify `false` to disable this.
          required: false
          type: string
          x-example: 'true'
        - name: tag
          in: query
          description: |-
            Whether to add tags to the target project if they are not already present.

            If omitted, `true` is assumed. Specify `false` to disable this.
          required: false
          type: string
          x-example: 'true'
        - name: status
          in: query
          description: |-
            Whether to add statuses to the target project if they are not already present.

            If omitted, `true` is assumed. Specify `false` to disable this.
          required: false
          type: string
          x-example: 'true'
        - name: custom-field
          in: query
          description: |-
            Whether to add non-empty custom fields to the target project if they are not already present.

            If omitted, `true` is assumed. Specify `false` to disable this.
          required: false
          type: string
          x-example: 'true'
        - name: return
          in: query
          description: '(Optional) Response shape: `full` (default) for the full record, or `compact` for identifiers only. See API description for `?return=` semantics.'
          required: false
          type: string
          x-example: compact
          enum:
            - full
            - compact
      responses:
        '200':
          description: OK ŌĆö updated task record.
          schema:
            $ref: '#/definitions/TaskWithParentInfo'
        '400':
          description: Bad Request ŌĆö invalid `project`, `task`, or `position`.
        '403':
          description: Forbidden ŌĆö caller lacks permission to transfer this task.
        '404':
          description: Not Found ŌĆö task, target project, or reference task does not exist.
