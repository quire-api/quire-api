        Pair with `?return=compact` to render each item as `{oid, id, cursor?}` for navigation/lookup workloads at minimal token cost.

        **Rate-limit cost** (#24558): proportional to the number of items returned ŌĆö `max(1, ceil(items / 100))` units. So `?limit=100` (or fewer items) costs 1, `?limit=1000` costs 10, `?limit=no` returning 5,000 items costs 50. Symmetric with bulk-write cost.

        To retrieve all tasks (including all subtasks), use the search API.
      operationId: getRootTasks
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: ID of the task's project. Specify "-" for personal tasks in My Tasks.
          required: true
          type: string
          x-example: my_project
        - name: limit
          in: query
          description: Page size (1..1000). Omit for the default unpaginated full list, or pass `no` to be explicit. When set and more results exist, the last item in the response carries a `cursor` field.
          required: false
          type: string
          x-example: '100'
        - name: cursor
          in: query
          description: Continuation token. Pass back the `cursor` value from the last item of the previous page to fetch the next page. Re-pass any filter (`?status=`) and `?limit=` on the same call.
          required: false
          type: string
      responses:
