    put:
      tags:
        - task
      summary: Move an existing task by its ID.
      description: |-
        Moves an existing task under another task as a subtask, reorders it among siblings, or sends it to the root level.

        Use `?task=` to name the reference task and `?position=` to choose placement (`parent` / `before` / `after`).

        Examples:
        - `PUT /task/move/id/my_project/42?task=99` ŌĆö reparent (default: child of task 99).
        - `PUT /task/move/id/my_project/42?task=99&position=before` ŌĆö place task 42 before task 99.
        - `PUT /task/move/id/my_project/42?task=99&position=after` ŌĆö place task 42 after task 99.
        - `PUT /task/move/id/my_project/42?task=root` ŌĆö move to root level.

        Returns the updated task record.
      operationId: moveTaskById
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: ID of the task's project. Specify "-" for personal tasks in My Tasks.
          required: true
          type: string
          x-example: my_project
        - name: taskId
          in: path
          description: Task ID to be moved.
          required: true
          type: integer
          format: int32
          x-example: 42
        - name: task
          in: query
          description: |-
            Reference task ID. How it's used depends on `position`:
            - `parent` (default): the moved task becomes a child of `task`.
            - `before` / `after`: the moved task is placed as a sibling, under `task`'s parent.

            Specify `root` to move to the root level (only valid with the default `parent` position).
          required: true
          type: string
          x-example: '253'
        - name: position
          in: query
          description: |-
            (Optional) Placement relative to `task`:
            - `parent` (default): child of `task`.
            - `before`: sibling immediately before `task`.
            - `after`: sibling immediately after `task`.

            Omitted or empty ŌåÆ same as `parent`. Any other value returns `400 Bad Request`. `before` / `after` require `task` to refer to a task (not `root`).
          required: false
          type: string
          x-example: before
          enum:
            - parent
            - before
            - after
        - name: return
          in: query
          description: '(Optional) Response shape: `full` (default) for the full record, or `compact` for identifiers only. See API description for `?return=` semantics.'
          required: false
          type: string
          x-example: compact
          enum:
            - full
            - compact
      responses:
        '200':
          description: OK ŌĆö updated task record.
          schema:
            $ref: '#/definitions/TaskWithParentInfo'
        '400':
          description: Bad Request ŌĆö invalid `task` or `position`.
        '403':
          description: Forbidden ŌĆö caller lacks permission to move this task.
        '404':
          description: Not Found ŌĆö task or reference task does not exist.
