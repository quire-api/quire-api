      description: |-
        Creates up to **300 root tasks** in one transaction.

        Body is a top-level JSON array of `CreateTaskBody` items (no envelope) ŌĆö same shape as single-task `POST /task/...`. Items can include nested `tasks` to create subtrees in the same call; only the **root** of each item is echoed in the response (use `GET /task/list/id/{projectId}/{rootId}` to enumerate the created subtree).

        Example request body:

        ```json
        [
          {
            "name": "Design new logo",
            "priority": 2,
            "tags": ["design"],
            "assignees": ["me"]
          },
          { "name": "Write spec", "due": "2026-05-10" },
          { "name": "Review" }
        ]
        ```

        Example response (full mode, abbreviated):

        ```json
        [
          { "oid": "iuRRiKoyrxdBFhFTTo", "id": 42, "name": "Design new logo", "priority": 2 },
          { "oid": "abcXyzPqRs",        "id": 43, "name": "Write spec" },
          { "oid": "defLmnQrSt",        "id": 44, "name": "Review" }
        ]
        ```

        With `?return=compact`, each element is just `{oid, id}`.

        **Atomic**: any per-item validation / permission / DB error rolls back the whole batch and returns `{code, message}` with `items[i]:` prefixed so the agent can pinpoint the offending row. Fix the value and retry. Example error:

        ```json
        { "code": 400, "message": "items[1]: Invalid value for `priority`: 99 (expected -1, 0, 1, or 2)" }
        ```

        **Rate-limit cost**: each bulk call costs `N` units against the per-minute / per-hour API quota, where `N` is the number of submitted items ŌĆö the same total cost as `N` equivalent single-task calls. Charged upfront; if the cost would exceed the quota, the whole batch is rejected with `429` before any item is processed.
      operationId: bulkAddTaskById
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: Project ID.
          required: true
          type: string
        - in: body
