  /task/add-timelog/id/{projectId}/{taskId}:
    post:
      tags:
        - task
      summary: Add a time log to a task by ID.
      description: |-
        Adds a [time log](#definition-Timelog) to the task identified by project + task ID. The new log is credited to the authenticated caller unless `user` is supplied in the body.

        Identity of a log is the triple `(user, start, end)`. Sub-second precision in `start` / `end` is truncated to whole seconds.

        On success returns the task's full timelogs array. Example:

        ```json
        [
          {
            "start": "2026-04-26T09:00:00.000Z",
            "end": "2026-04-26T10:30:00.000Z",
            "billable": true,
            "note": "Pair-programming session",
            "user": { "oid": "u-123", "name": "John Doe" }
          }
        ]
        ```
      operationId: addTaskTimelogById
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: Project ID.
          required: true
          type: string
        - name: taskId
          in: path
          description: Task ID.
          required: true
          type: integer
          format: int32
        - in: body
          name: body
          description: Time log to add.
          required: true
          schema:
            $ref: '#/definitions/AddTimelogBody'
      responses:
        '200':
          description: OK ŌĆö task's full timelogs array.
          schema:
            type: array
            items:
              $ref: '#/definitions/Timelog'
        '400':
          description: Bad Request ŌĆö `start` / `end` missing or malformed, `end` precedes `start`, or `user` is unknown.
          schema:
            $ref: '#/definitions/ErrorResponse'
        '404':
          description: Not Found ŌĆö task does not exist.
          schema:
            $ref: '#/definitions/ErrorResponse'
        '409':
          description: Conflict ŌĆö a log with the same `(user, start, end)` already exists; use `PUT /task/update-timelog/...` to amend it.
          schema:
            $ref: '#/definitions/ErrorResponse'
