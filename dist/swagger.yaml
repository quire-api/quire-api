  /task/update-timelog/id/{projectId}/{taskId}:
    put:
      tags:
        - task
      summary: Update an existing time log on a task by ID.
      description: |-
        Updates an existing [time log](#definition-Timelog) on the task identified by project + task ID. The log to update is located by the `start`, `end`, and (optional) `user` query parameters ŌĆö that triple is the log's identity. The body carries new values; any field omitted **or set to `null`** preserves the existing value (so an agent that always includes every field with `null` for unchanged ones is safe). To clear `note`, send an empty string.

        Sub-second precision in time values is truncated to whole seconds (in both query params and body).

        On success returns the task's full timelogs array. Example:

        ```json
        [
          {
            "start": "2026-04-26T09:15:00.000Z",
            "end": "2026-04-26T10:45:00.000Z",
            "billable": true,
            "note": "Updated note",
            "user": { "oid": "u-123", "name": "John Doe" }
          }
        ]
        ```
      operationId: updateTaskTimelogById
      produces:
        - application/json
      parameters:
        - name: projectId
          in: path
          description: Project ID.
          required: true
          type: string
        - name: taskId
          in: path
          description: Task ID.
          required: true
          type: integer
          format: int32
        - name: start
          in: query
          description: Start timestamp of the existing log (identifies the log together with `end` and `user`). ISO 8601, UTC.
          required: true
          type: string
          x-example: '2026-04-26T09:00:00Z'
        - name: end
          in: query
          description: End timestamp of the existing log. ISO 8601, UTC.
          required: true
          type: string
          x-example: '2026-04-26T10:30:00Z'
        - name: user
          in: query
          description: (Optional) User the existing log is credited to (OID, ID, or email). Omitted defaults to the authenticated caller.
          required: false
          type: string
          x-example: john.doe@example.com
        - in: body
          name: body
          description: Fields to change.
          required: true
          schema:
            $ref: '#/definitions/UpdateTimelogBody'
      responses:
        '200':
          description: OK ŌĆö task's full timelogs array.
          schema:
            type: array
            items:
              $ref: '#/definitions/Timelog'
        '400':
          description: Bad Request ŌĆö query params missing or malformed, or new `end` precedes new `start`.
        '404':
          description: Not Found ŌĆö no log matches the identifying triple, or the task does not exist.
